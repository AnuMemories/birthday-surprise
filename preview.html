<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Preview</title>

<style>
body{
    background:#1b0033;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:25px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.item{
    background:#3b136b;
    padding:10px;
    border-radius:15px;
}

.item img{
    width:100%;
    border-radius:12px;
}

.name{
    margin-top:10px;
    font-size:18px;
    color:#ffd700;
}
</style>

</head>
<body>

<h1>📸 Image Preview</h1>

<div class="gallery">

<div class="item">
<img src="assets/images/1.png">
<div class="name">1.png</div>
</div>

</div>

<div class="item">

</div>

<div class="item">

</div>

<div class="item">
<img src="assets/images/5.jpeg">
<div class="name">5.jpeg</div>
</div>

<div class="item">

<div class="item">

<div class="item">

</body>
</html>
