<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Anamika ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background -->
    <div class="background">
        <div class="stars"></div>
        <div class="hearts"></div>
    </div>

    <!-- Main Card -->
    <div class="container">

        <div class="glass-card">

            <h2>🎂 Happy Birthday</h2>

            <h1>Anamika 💖</h1>

            <p class="subtitle">
    Someone made this day a little more special... ✨
</p>

<h3>
    🤍 Who do you think it is?
</h3>

<input
    type="password"
    id="password"
    placeholder="Type the name..."
    autocomplete="off">

<button onclick="checkPassword()">
    🔓 Unlock My Surprise
</button>

<p class="hint">
    💭 Hint: Just type the name of the person who never wants to see you stop smiling.
</p>

            <p id="error"></p>

        </div>

    </div>

    <script type="module" src="script.js"></script>

</body>

</html>
